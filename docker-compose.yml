services:
  postgres:
    image: postgres:16-alpine
    container_name: fulltankgarage-postgres
    environment:
      POSTGRES_USER: fulltankgarage
      POSTGRES_PASSWORD: fulltankgarage
      POSTGRES_DB: fulltankgarage
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fulltankgarage -d fulltankgarage"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fulltankgarage-redis
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: fulltankgarage-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://fulltankgarage:fulltankgarage@postgres:5432/fulltankgarage?sslmode=disable
      REDIS_ADDR: redis:6379
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:
  redis_data:
